name: CI/CD Frontend RedNorte

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: ClusterRedNorte
  ECR_REGISTRY: 318533236125.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-deploy:
    name: Build, Push y Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build y Push frontend
        run: |
          docker build \
            -t $ECR_REGISTRY/rednorte/frontend:$IMAGE_TAG .
          docker push $ECR_REGISTRY/rednorte/frontend:$IMAGE_TAG

      - name: Configurar kubectl para EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Reemplazar IMAGE_TAG y desplegar
        run: |
          sed "s|\${IMAGE_TAG}|$IMAGE_TAG|g" k8s/frontend.yml | kubectl apply -f -

      - name: Verificar despliegue
        run: |
          kubectl rollout status deployment/frontend -n rednorte --timeout=120s